[tool.pytest.ini_options]
testpaths = xiaozhi_openclaw/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=xiaozhi_openclaw
    --cov-report=term-missing
    --cov-report=html

[tool.coverage:run]
source = xiaozhi_openclaw
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[tool.coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
